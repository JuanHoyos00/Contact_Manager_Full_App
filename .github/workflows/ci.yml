name: Software Quality & Automated Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install UV Toolchain
      run: curl -sSf https://rye.astral.sh/uv/install.sh | sh
      
    - name: Install Project Dependencies
      run: uv sync

    - name: Run Ruff Linter & Code Style Check
      run: uv run ruff check src/

    - name: Evaluate Cyclomatic Complexity (Radon Category A)
      run: |
        uv pip install radon
        uv run radon cc src/ -s -n A

    - name: Execute Automated Unit Tests (Pytest)
      run: uv run pytest