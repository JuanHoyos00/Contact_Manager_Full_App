name: Software Quality & Automated Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Setup UV Toolchain
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install Project Dependencies
      run: uv sync --all-groups

    - name: Run Ruff Linter & Code Style Check
      run: uv run ruff check src/

    - name: Evaluate Cyclomatic Complexity (Radon Category A)
      # Apuntamos exactamente a los archivos sueltos y directorios de tu árbol de carpetas
      run: uv run radon cc src/api src/models src/storage src/services.py src/exceptions.py -s -n A

    - name: Execute Automated Unit Tests (Pytest)
      # Inyectamos el directorio src en el PATH para evitar errores de importación en el servidor
      env:
        PYTHONPATH: src
      run: uv run pytest