name: ci 
on:
  push:
    branches:
      - main
      - master
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: echo "cache_id=$(date --utc +%Y%m%d)" >> $GITHUB_ENV
      
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
            
      - name: Install dependencies
        run: pip install "mkdocs-material>=9.5.0" "mkdocstrings-python>=1.10.0"
        
      - name: Deploy Documentation
        # Le indicamos explícitamente a MkDocs que busque los módulos desde la raíz del proyecto
        env:
          PYTHONPATH: .
        run: mkdocs gh-deploy --force