site_name: Contact Manager Pro
site_description: Documentation for the Clean Architecture Contact Management system.
site_author: Your Group Name

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
          setup_commands:
            - import sys
            - sys.path.insert(0, ".")
            - sys.path.insert(0, "src")

nav:
  - Home: index.md
  - User Guide: user_guide.md
  - API Reference: reference.md