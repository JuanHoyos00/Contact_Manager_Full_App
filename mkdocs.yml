site_name: Contact Manager Pro
site_description: Documentation for the Clean Architecture Contact Management system.
site_author: Your Group Name

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            paths: [.]  # Esto le dice a Python que busque desde la raíz del proyecto

nav:
  - Home: index.md
  - User Guide: user_guide.md
  - API Reference: reference.md